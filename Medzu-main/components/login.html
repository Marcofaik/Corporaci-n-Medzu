<div id="loginModal" class="modal-login">

    <div class="login-box">

        <span id="cerrarLogin" class="cerrar-login">&times;</span>

        <h2>Iniciar sesión</h2>

        <form id="formLogin">

            <input
                type="text"
                id="usuario"
                placeholder="Usuario"
                required
            >

            <input
                type="password"
                id="clave"
                placeholder="Contraseña"
                required
            >

            <button type="submit">

                Ingresar

            </button>

        </form>

    </div>

</div>
